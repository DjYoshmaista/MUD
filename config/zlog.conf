# zlog.conf - MUD logging configuration

[global]
strict init = true
buffer min = 1024
buffer max = 10 MB
rotate lock file = self
default format = "%d(%F %T) %-5V [%c] %F:%L %m%n"

[formats]
simple = "%m%n"
normal = "%d(%F %T) %-5V [%c] %F:%L %m%n"

[rules]
default.*     >stderr; simple
mud.*         >stderr; normal
mud_core.DEBUG      "logs/mud.log", 25 MB * 10; normal
mud_session.INFO    "logs/mud_session.log", 5 MB * 4; normal      
mud_script.DEBUG    "logs/mud_script.log", 5 MB * 4; normal
mud_auth.INFO       "logs/mud_auth.log", 10 MB * 4; normal
mud_net.DEBUG       "logs/mud_net.log", 5 MB * 4; normal
mud_auth.INFO       "logs/mud_audit.log", 10 MB * 4; normal
mud_db.WARN         "logs/mud_db.log", 5 MB * 4; normal
mud_world.INFO      "logs/mud_world.log", 10 MB * 4; normal
mud_arena.INFO      "logs/mud_arena.log", 10 MB * 6; normal
mud_admin.DEBUG     "logs/mud_admin.log", 10 MB * 8; normal
