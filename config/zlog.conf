# zlog.conf - MUD logging configuration

[global]
strict init = true
buffer min = 1024
buffer max = 2 MB
rotate lock file = self
default format = "%d(%F %T) %-5V [%c] %F:%L %m%n"

[formats]
simple = "%m%n"
normal = "%d(%F %T) %-5V [%c] %F:%L %m%n"

[rules]
default.*     >stderr; simple
mud.*         >stderr; normal
mud.net.DEBUG "logs/mud_net.log", 5 MB * 4; normal
mud.auth.INFO "logs/mud_audit.log", 10 MB * 4; normal
mud.db.WARN   "logs/mud_db.log", 5 MB * 4; normal
mud.world.INFO "logs/mud_world.log", 10 MB * 4; normal
mud.*         "logs/mud.log", 10 MB * 8; normal
