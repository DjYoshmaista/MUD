# zlog.conf - MUD logging configuration

[global]
strict init = true
buffer min = 1024
buffer max = 10 MB
rotate lock file = self
default format = "%d(%F %T) %-5V [%c] %F:%L %m%n"

[formats]
simple = "%m%n"
normal = "%d(%F %T) %-5V [%c] %F:%L %m%n"

[rules]
default.*     >stderr; simple
mud.*         >stderr; normal
mud.test.DEBUG      "logs/mud_test.log", 15 MB * 3; normal
mud.core.DEBUG      "logs/mud.log", 25 MB * 10; normal
mud.session.DEBUG   "logs/mud_session.log", 5 MB * 4; normal      
mud.script.DEBUG    "logs/mud_script.log", 5 MB * 4; normal
mud.auth.DEBUG      "logs/mud_auth.log", 10 MB * 4; normal
mud.net.DEBUG       "logs/mud_net.log", 5 MB * 4; normal
mud.auth.DEBUG      "logs/mud_audit.log", 10 MB * 4; normal
mud.db.DEBUG        "logs/mud_db.log", 5 MB * 4; normal
mud.world.DEBUG     "logs/mud_world.log", 10 MB * 4; normal
mud.arena.DEBUG     "logs/mud_arena.log", 10 MB * 6; normal
mud.admin.DEBUG     "logs/mud_admin.log", 10 MB * 8; normal
