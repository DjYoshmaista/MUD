# config/mud.conf
# libconfig format: uses C-sytle syntax with {} for groups, () for lists, [] for arrays
# Strings must be quoted.  Integers and booleans are unquoted.

file: {
    name        = "config/mud.conf";
    description = "MUD Configuration File";
    path        = "config/mud.conf";
};

# -- Server Identity
server: {
    name        = "MUDv2";
    motd_path   = "config/motd.txt";
	host		= "localhost";
	telnet_port = 4000;
	admin_port	= 6969;
    max_players = 200;
};

# -- Network
network: {
    telnet: {
        enabled = true;
        port    = 4000;
    };
    admin_http: {
        enabled = true;
        port    = 6969;
        bind    = "127.0.0.1";  # Only accept admint connections from localhost
    };
    max_connections = 256;
    connection_timeout_seconds = 300;
};

# -- Database
database: {
    path = "data/mud.db";
};

# -- Logging
logging: {
    config_path = "config/zlog.conf";
};

# -- Scripting (Lua)
scripting: {
    enabled     = true;
    script_dir  = "scripts/";
    init_script = "scripts/init.lua";
};

# -- Authentication
auth: {
    max_failed_logins   = 5;
    lockout_seconds     = 300;
    session_ttl_seconds = 3600;
    allow_new_accounts  = true;
};
