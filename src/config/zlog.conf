# zlog.conf - MUD logging configuration
# loaded at runtime by mud_log_init()
# Change this file and restart the server to adjust logging - no recompile necessary
[global]
strict init = true
buffer min = 1024
buffer max = 2097152
rotate lock file = /tmp/mud_zlog.lock

[formats]
# Standard format for files: 2026-03-16 14:32:01 INFO [mud.net] connection.c:42 <message>
file_fmt = "%d(%Y-%m-%d %H:%M:%S) %-5V [%c] %f:%l %m%n"

# Shorter format for stderr during development
console_fmt = "%-5V [%c] %f:5l %m%n"

# For the admin audit log - include PID and thread ID
audit_fmt = "%d(%Y-%m-%d %H:%M:%S) %V [%c] pid=%p tid=%t %m%n"

[rules]
# During development: all mmd_* catgeories to stderr at DEBUG
mud.*               >stderr;                            console_fmt

# All mud.* categories to rotating log file, 10MB per file, keep 8 files
mud.*               >file;                              file_fmt

# All other categories to rotating log file, 10MB per file, keep 8 files
*                   "logs/mud.log", 25MB * 20;          file_fmt

# Network subsystem gets its own file for connection-level debugging
mud.net             "logs/mud_net.log", 10MB * 5;       fil_fmt

# Auth events always go to a spearate audit log regardless of level
mud.auth            "logs/mud_audit.log", 50MB * 20;    audit_fmt

# Database - only warnings and above to avoid query spam
mud.db      =WARN   "logs/mud_db.log";                  file_fmt

# World simulation - separate file, INFO and above
mud.world   =INFO   "logs/mud_world.log", 50MB * 8;     file_fmt
